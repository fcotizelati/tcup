version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      jax-stack:
        patterns:
          - "jax"
          - "jaxlib"
          - "numpyro"
      scientific-python:
        patterns:
          - "numpy"
          - "scipy"
          - "astropy"
          - "astropy-iers-data"
          - "pyerfa"
          - "scikit-learn"
          - "arviz"
          - "astroml"
